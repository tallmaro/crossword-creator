<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crossword</title>
<style>
  :root{
    --cell: 34px; --line:#23201c; --black:#1a1a1a;
    --hl:#bfe0ff; --hl-soft:#e7f1fb; --cur:#ffd24a;
    --ink:#1a1714; --muted:#6b6258; --accent:#7a1f2b; --paper:#f6f3ec;
    --panel:#fffdf8; --wrong:#c0142c;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;color:var(--ink);
       background:var(--paper);display:flex;flex-direction:column;overflow:hidden}

  /* ---- top bar ---- */
  header{display:flex;align-items:baseline;gap:16px;justify-content:space-between;
         padding:12px 20px 10px;border-bottom:1px solid #e3ddd0;flex:0 0 auto}
  header h1{margin:0;font-size:22px;letter-spacing:.3px;white-space:nowrap}
  header .meta{color:var(--muted);font-size:13px;font-style:italic;
               overflow:hidden;text-overflow:ellipsis;flex:1}
  header .actions{display:flex;gap:8px;flex:0 0 auto}
  button{font:inherit;font-size:13px;padding:6px 12px;border:1px solid #cfc7b8;
         background:var(--panel);border-radius:7px;cursor:pointer;color:var(--ink)}
  button:hover{background:#efe9dc}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  /* ---- main split ---- */
  main{flex:1;display:flex;gap:22px;min-height:0;padding:14px 20px 16px}
  .board{display:flex;flex-direction:column;align-items:center;min-height:0;flex:0 0 auto}

  /* current-clue bar — the thing that kills the scrolling */
  .cluebar{display:flex;align-items:stretch;width:100%;margin-bottom:10px;
           border:1px solid #d8d0c0;border-radius:9px;overflow:hidden;background:var(--panel)}
  .cluebar button{border:0;border-radius:0;background:var(--hl-soft);font-size:20px;
                  padding:0 14px;color:var(--accent);font-family:system-ui}
  .cluebar button:hover{background:var(--hl)}
  .cluebar .ct{flex:1;padding:9px 12px;min-width:0;display:flex;align-items:center;gap:10px}
  .cluebar .tag{font-weight:bold;color:var(--accent);white-space:nowrap;font-size:14px}
  .cluebar .txt{font-size:16px;line-height:1.25;overflow:hidden}

  #grid{display:grid;grid-template-columns:repeat(var(--n,15),var(--cell));
        grid-auto-rows:var(--cell);border:3px solid var(--line);background:var(--line);
        gap:1px;width:max-content}
  .cell{position:relative;background:#fff;display:flex;align-items:center;justify-content:center;
        font-size:calc(var(--cell)*0.56);font-weight:600;cursor:pointer;user-select:none;
        text-transform:uppercase}
  .cell.black{background:var(--black);cursor:default}
  .cell.hl{background:var(--hl-soft)}
  .cell.cur{background:var(--cur)}
  .cell .num{position:absolute;top:0;left:2px;font-size:calc(var(--cell)*0.27);
             font-weight:700;font-family:Arial,sans-serif;color:#555;line-height:1.1}
  .cell.wrong{color:var(--wrong)}
  .cell.wrong::after{content:"";position:absolute;inset:0;
        background:linear-gradient(to top right,transparent 46%,var(--wrong) 47%,var(--wrong) 53%,transparent 54%)}
  .board .hint{margin-top:9px;font-size:12px;color:var(--muted);font-style:italic;text-align:center}

  /* ---- clue panels: two independently-scrolling columns ---- */
  .clues{flex:1;display:flex;gap:18px;min-width:0;min-height:0}
  .clue-col{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
  .clue-col h2{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;
               color:var(--accent);border-bottom:2px solid var(--line);padding-bottom:5px;flex:0 0 auto}
  ol{list-style:none;margin:0;padding:0 6px 0 0;font-size:14px;overflow-y:auto;flex:1;min-height:0}
  ol li{display:flex;gap:9px;padding:4px 7px;border-radius:5px;cursor:pointer;line-height:1.3;
        scroll-margin:8px}
  ol li:hover{background:#efe9dc}
  ol li.active{background:var(--hl)}
  ol li .n{font-weight:700;min-width:22px;text-align:right;color:var(--muted)}
  ol li.active .n{color:var(--accent)}

  .cell.right .ltr{color:#2e7d54}          /* checked & correct */
  #win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
       background:rgba(26,23,20,.45);z-index:20}
  #win.show{display:flex}
  #win .card{background:var(--panel);border:1px solid #d8d0c0;border-radius:14px;
       padding:26px 40px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.28)}
  #win .card h2{margin:0 0 4px;font-size:28px;color:var(--accent)}
  #win .card p{margin:0 0 18px;color:var(--muted);font-size:16px}
  #win .card button{font-size:15px;padding:8px 24px}

  #loader{margin:40px auto;max-width:520px;padding:20px;background:var(--panel);
          border:1px solid #ddd;border-radius:10px}
  .hidden{display:none}

  /* ---- responsive: stack on narrow screens, keep clue bar in reach ---- */
  @media (max-width:880px){
    body{overflow:auto}
    main{flex-direction:column;align-items:center}
    .clues{width:100%;max-width:560px}
    ol{max-height:34vh}
  }
</style>
</head>
<body>
  <header>
    <h1 id="title">Crossword</h1>
    <div class="meta" id="meta"></div>
    <div class="actions">
      <button id="bCheck" title="Mark incorrect letters">Check</button>
      <button id="bReveal" title="Fill in the solution">Reveal</button>
      <button id="bClear" title="Erase your answers">Clear</button>
    </div>
  </header>

  <div id="loader" class="hidden">
    <p>Couldn't auto-load <code>crossword.json</code> (browsers block this when you
       open the file directly). Pick it to continue:</p>
    <input type="file" id="file" accept="application/json,.json">
    <p style="color:#777;font-size:13px">Or run <code>python3 -m http.server</code>
       in this folder and open the localhost URL.</p>
  </div>

  <main id="app" class="hidden">
    <section class="board">
      <div class="cluebar">
        <button id="prevClue" title="Previous clue (Shift+Tab)" aria-label="Previous clue">‹</button>
        <div class="ct"><span class="tag" id="cbTag"></span><span class="txt" id="cbTxt"></span></div>
        <button id="nextClue" title="Next clue (Tab)" aria-label="Next clue">›</button>
      </div>
      <div id="grid" tabindex="0" aria-label="Crossword grid"></div>
      <div class="hint">type to fill · <b>Tab</b> next clue · <b>Space</b> switch direction · arrows move</div>
    </section>
    <aside class="clues">
      <div class="clue-col"><h2>Across</h2><ol id="acrossList"></ol></div>
      <div class="clue-col"><h2>Down</h2><ol id="downList"></ol></div>
    </aside>
  </main>
  <div id="win"><div class="card">
    <h2>🎉 Solved!</h2>
    <p id="winTitle"></p>
    <button id="winClose">Nice</button>
  </div></div>

<script>
let KEY = "xword-progress";
let P, N, GRID, NUMS, ACROSS, DOWN;
let cellOf = {};                 // "r,c" -> {acrossEntry, downEntry}
let user = {};                   // "r,c" -> letter
let sel = {r:0, c:0, dir:"across"};

function loadData(data){
  P = data; N = P.size.rows;
  KEY = "xword:" + (P.title || "untitled");
  document.title = (P.title ? P.title + " — " : "") + "crossword";
  GRID = P.grid; NUMS = P.gridnums;
  ACROSS = P.clues.across.slice().sort((a,b)=>a.num-b.num);
  DOWN = P.clues.down.slice().sort((a,b)=>a.num-b.num);
  document.getElementById("title").textContent = P.title || "Crossword";
  document.getElementById("meta").textContent =
      [P.theme, P.difficulty].filter(Boolean).join(" · ");
  document.documentElement.style.setProperty("--n", N);
  indexCells(); restore();
  buildGrid(); buildClueLists(); fitGrid();
  document.getElementById("loader").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  fitGrid();
  outer: for(let r=0;r<N;r++) for(let c=0;c<N;c++)
    if(GRID[r][c]!==null){ selectCell(r,c,"across"); break outer; }
}

function indexCells(){
  cellOf={};
  for(const e of ACROSS) for(let i=0;i<e.len;i++)
    (cellOf[e.row+","+(e.col+i)] = cellOf[e.row+","+(e.col+i)]||{}).acrossEntry=e;
  for(const e of DOWN) for(let i=0;i<e.len;i++)
    (cellOf[(e.row+i)+","+e.col] = cellOf[(e.row+i)+","+e.col]||{}).downEntry=e;
}

function fitGrid(){
  const vw=innerWidth, vh=innerHeight, desktop=vw>=880;
  const availW = desktop ? Math.min(vw*0.56, 660) : vw-28;
  const availH = vh - (desktop ? 200 : 330);
  const cell = Math.max(19, Math.min(40, Math.floor(Math.min(availW, availH)/N)));
  document.documentElement.style.setProperty("--cell", cell+"px");
}
addEventListener("resize", ()=>{ if(P) fitGrid(); });

function buildGrid(){
  const g=document.getElementById("grid"); g.innerHTML="";
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const d=document.createElement("div");
    d.className="cell"+(GRID[r][c]===null?" black":"");
    d.dataset.r=r; d.dataset.c=c;
    if(GRID[r][c]!==null){
      if(NUMS[r][c]){const s=document.createElement("span");s.className="num";s.textContent=NUMS[r][c];d.appendChild(s);}
      const t=document.createElement("span");t.className="ltr";t.textContent=user[r+","+c]||"";d.appendChild(t);
      d.addEventListener("click",()=>{ (sel.r===r&&sel.c===c)?toggleDir():selectCell(r,c,sel.dir); });
    }
    g.appendChild(d);
  }
}
function buildClueLists(){
  for(const [id,arr,dir] of [["acrossList",ACROSS,"across"],["downList",DOWN,"down"]]){
    const ol=document.getElementById(id); ol.innerHTML="";
    for(const e of arr){
      const li=document.createElement("li");
      li.dataset.num=e.num; li.dataset.dir=dir;
      li.innerHTML=`<span class="n">${e.num}</span><span>${esc(e.clue)}</span>`;
      li.addEventListener("click",()=>selectEntry(e,dir));
      ol.appendChild(li);
    }
  }
}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

function activeEntry(){
  const info=cellOf[sel.r+","+sel.c]||{};
  return sel.dir==="across"? info.acrossEntry : info.downEntry;
}
function selectCell(r,c,dir){
  if(GRID[r][c]===null) return;
  const info=cellOf[r+","+c]||{};
  if(dir==="across"&&!info.acrossEntry) dir="down";
  if(dir==="down"&&!info.downEntry) dir="across";
  sel={r,c,dir}; paint(); document.getElementById("grid").focus();
}
function toggleDir(){
  const info=cellOf[sel.r+","+sel.c]||{};
  const other=sel.dir==="across"?"down":"across";
  if((other==="across"&&info.acrossEntry)||(other==="down"&&info.downEntry)) sel.dir=other;
  paint();
}
function firstEmptyOf(e,dir){               // first blank square of an entry, else its start
  for(let i=0;i<e.len;i++){
    const r=dir==="across"?e.row:e.row+i, c=dir==="across"?e.col+i:e.col;
    if(!user[r+","+c]) return [r,c];
  }
  return [e.row,e.col];
}
// Selecting a WORD (clue click, Tab, arrows in the bar) lands on its first
// blank square — not on a letter a crossing already filled in.
function selectEntry(e,dir){ const [r,c]=firstEmptyOf(e,dir); selectCell(r,c,dir); }
function cell(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}

function paint(){
  document.querySelectorAll(".cell").forEach(d=>d.classList.remove("hl","cur"));
  const e=activeEntry();
  if(e){
    for(let i=0;i<e.len;i++){
      const r=sel.dir==="across"?e.row:e.row+i, c=sel.dir==="across"?e.col+i:e.col;
      cell(r,c)?.classList.add("hl");
    }
  }
  cell(sel.r,sel.c)?.classList.add("cur");
  document.querySelectorAll("ol li").forEach(li=>li.classList.remove("active"));
  if(e){
    document.getElementById("cbTag").textContent = e.num + (sel.dir==="across"?"A":"D");
    document.getElementById("cbTxt").textContent = e.clue;
    const li=document.querySelector(`ol li[data-num="${e.num}"][data-dir="${sel.dir}"]`);
    if(li){ li.classList.add("active"); li.scrollIntoView({block:"nearest"}); }
  }
}

function setLetter(r,c,ch){
  if(ch) user[r+","+c]=ch; else delete user[r+","+c];
  const d=cell(r,c); if(d) d.querySelector(".ltr").textContent=ch;
  // A Check is a snapshot; editing invalidates it. Clear every mark so none
  // can linger on a cell that's since become correct (or that you changed).
  document.querySelectorAll(".cell.wrong,.cell.right").forEach(x=>x.classList.remove("wrong","right"));
  save();
}
function entryCells(e,dir){
  const out=[];
  for(let i=0;i<e.len;i++) out.push(dir==="across"?[e.row,e.col+i]:[e.row+i,e.col]);
  return out;
}
function isFilled(e,dir){ return entryCells(e,dir).every(([r,c])=>user[r+","+c]); }

function step(forward){
  const e=activeEntry(); if(!e) return false;
  let i=sel.dir==="across"? sel.c-e.col : sel.r-e.row;
  i+=forward?1:-1;
  if(i<0||i>=e.len) return false;
  sel.r=sel.dir==="across"?e.row:e.row+i;
  sel.c=sel.dir==="across"?e.col+i:e.col;
  paint(); return true;
}
function move(dr,dc){
  let r=sel.r+dr,c=sel.c+dc;
  while(r>=0&&r<N&&c>=0&&c<N){ if(GRID[r][c]!==null){selectCell(r,c,sel.dir);return;} r+=dr;c+=dc; }
}
// All clues in solving order: every Across (by number), then every Down.
function cluesInOrder(){ return ACROSS.map(e=>[e,"across"]).concat(DOWN.map(e=>[e,"down"])); }
// Move to the next/previous clue (delta ±1). When skipFilled, hop over clues
// that are already complete (Tab/Enter); otherwise step one at a time (clue-bar
// arrows). Land on the clue's first blank square. Wraps Across→Down→Across.
function gotoClue(delta, skipFilled){
  const list=cluesInOrder(), n=list.length, e=activeEntry();
  let idx=list.findIndex(([x,d])=>e && x.num===e.num && d===sel.dir);
  if(idx<0) idx=0;
  for(let k=1;k<=n;k++){
    const [x,d]=list[((idx+delta*k)%n+n)%n];
    if(!skipFilled || !isFilled(x,d)){ selectEntry(x,d); return; }
  }
  const [x,d]=list[((idx+delta)%n+n)%n]; selectEntry(x,d);   // everything filled
}
// Arrow keys: a perpendicular arrow switches direction in place (stay-and-switch,
// NYT/DFAC); pressing again then moves. A parallel arrow moves one white cell.
function arrowKey(axis,dr,dc){
  const info=cellOf[sel.r+","+sel.c]||{};
  const hasWord=(axis==="across"&&info.acrossEntry)||(axis==="down"&&info.downEntry);
  if(sel.dir!==axis && hasWord){ sel.dir=axis; paint(); return; }
  sel.dir=axis; move(dr,dc);
}

addEventListener("keydown",ev=>{
  if(document.getElementById("app").classList.contains("hidden")) return;
  const k=ev.key;
  if(k==="Tab"){ ev.preventDefault(); gotoClue(ev.shiftKey?-1:1, true); return; }
  if(k==="Enter"){ ev.preventDefault(); gotoClue(1, true); return; }
  if(k===" "){ ev.preventDefault(); toggleDir(); return; }
  if(k==="ArrowRight"){ ev.preventDefault(); arrowKey("across",0,1); return; }
  if(k==="ArrowLeft"){ ev.preventDefault(); arrowKey("across",0,-1); return; }
  if(k==="ArrowDown"){ ev.preventDefault(); arrowKey("down",1,0); return; }
  if(k==="ArrowUp"){ ev.preventDefault(); arrowKey("down",-1,0); return; }
  if(k==="Backspace"){ ev.preventDefault();
    if(user[sel.r+","+sel.c]) setLetter(sel.r,sel.c,"");    // letter present → delete in place
    else if(step(false)) setLetter(sel.r,sel.c,"");         // empty → step back and delete
    return; }
  if(k==="Delete"){ ev.preventDefault(); setLetter(sel.r,sel.c,""); return; }   // clear, stay
  if(/^[a-zA-Z]$/.test(k)){ ev.preventDefault();
    setLetter(sel.r,sel.c,k.toUpperCase());
    step(true);            // advance one square within the word; no auto clue-jump
    checkWin();
    return; }
});

document.getElementById("prevClue").onclick=()=>gotoClue(-1,false);
document.getElementById("nextClue").onclick=()=>gotoClue(1,false);

function isSolved(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)
    if(GRID[r][c]!==null && (user[r+","+c]||"")!==GRID[r][c]) return false;
  return true;
}
let won=false;
function checkWin(){ if(!won && isSolved()){ won=true;
  document.getElementById("winTitle").textContent = P.title || "";
  document.getElementById("win").classList.add("show"); } }

// Check marks the grid itself — red slash on wrong letters, green on correct —
// the way solvers expect. No message popup.
document.getElementById("bCheck").onclick=()=>{
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(GRID[r][c]===null)continue;
    const d=cell(r,c), v=user[r+","+c]||""; d.classList.remove("wrong","right");
    if(v) d.classList.add(v===GRID[r][c] ? "right" : "wrong");
  }
  checkWin();
};
document.getElementById("bReveal").onclick=()=>{
  if(!confirm("Reveal the full solution?"))return;
  won=true;                                  // revealing isn't solving — skip the celebration
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(GRID[r][c]!==null) setLetter(r,c,GRID[r][c]);
};
document.getElementById("bClear").onclick=()=>{
  if(!confirm("Clear all your answers?"))return;
  user={}; won=false; save();
  document.querySelectorAll(".cell .ltr").forEach(s=>s.textContent="");
  document.querySelectorAll(".cell").forEach(d=>d.classList.remove("wrong","right"));
};
document.getElementById("winClose").onclick=()=>document.getElementById("win").classList.remove("show");

function save(){try{localStorage.setItem(KEY,JSON.stringify(user));}catch(e){}}
function restore(){try{const s=localStorage.getItem(KEY); user=s?JSON.parse(s):{};}catch(e){user={};}}

fetch("crossword.json").then(r=>{if(!r.ok)throw 0;return r.json()}).then(loadData)
  .catch(()=>{
    document.getElementById("loader").classList.remove("hidden");
    document.getElementById("file").addEventListener("change",ev=>{
      const f=ev.target.files[0]; if(!f)return;
      const fr=new FileReader();
      fr.onload=()=>{try{loadData(JSON.parse(fr.result));}catch(e){alert("Invalid JSON: "+e);}};
      fr.readAsText(f);
    });
  });
</script>
</body>
</html>
